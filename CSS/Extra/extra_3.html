<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cards de Animales</title>
  <link rel="stylesheet" href="extra_3.css">
</head>
<body>

  <h1 class="titulo">Elements Animals</h1>

  <!-- CONTENEDOR DE LAS 3 CARDS -->
  <div class="contenedor">

    <!-- CARD 1 -->
    <div class="card">
      <img class="card-imagen" src="https://th-thumbnailer.cdn-si-edu.com/EHMOcA1u4xtpYfYmx8agWTRIS7w=/fit-in/1200x0/filters:focal(1542x1697:1543x1698)/https://tf-cmsv2-smithsonianmag-media.s3.amazonaws.com/filer/d0/06/d00620a0-8dc9-4be8-a3c1-cd075845b348/42-53008611.jpg" alt="shark">
      <div class="card-info">
        <h2 class="card-nombre">The Shark</h2>
        <p class="card-descripcion">One of the most dangerous animal in the water, be careful.</p>
      </div>
    </div>

    <!-- CARD 2 -->
    <div class="card">
      <img class="card-imagen" src="https://cdn.unotv.com/images/2024/11/rinoceronte-nepal-184836.jpg" alt="rhino">
      <div class="card-info">
        <h2 class="card-nombre">The Rhino</h2>
        <p class="card-descripcion">Pre historic animal, but aren´t friend of any.</p>
      </div>
    </div>

    <!-- CARD 3 -->
    <div class="card">
      <img class="card-imagen" src="https://i.natgeofe.com/k/afe51970-80c6-46c3-b047-4c407c72d874/bald-eagle-closeup_3x2.jpg" alt="eagle">
      <div class="card-info">
        <h2 class="card-nombre">The Eagle</h2>
        <p class="card-descripcion">Wonderful , but acurate with your victims.</p>
      </div>
    </div>

  </div>

</body>
</html>

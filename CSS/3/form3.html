<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billboard Hot 100</title>
    <link rel="stylesheet" href="form3.css">
</head>
<body>
    <div class="container">
        <header class="billboard-header">
            <h1 class="billboard-title">Billboard Hot 100</h1>
            <p class="billboard-date">WEEK OF FEBRUARY 10, 2024</p>
        </header>


        <table class="hot100-table">
            <thead>
                <tr class="table-header">
                    <th class="col-rank">THIS WEEK</th>
                    <th class="col-artwork"></th>
                    <th class="col-song"></th>
                    <th class="col-award">AWARD</th>
                    <th class="col-last">LAST<br>WEEK</th>
                    <th class="col-peak">PEAK<br>POS.</th>
                    <th class="col-weeks">WKS ON<br>CHART</th>
                </tr>
            </thead>
            <tbody>
                
                <tr class="song-row">
                    <td class="rank">
                        <span class="rank-number">1</span>
                    </td>
                    <td class="artwork">
                        <img src="https://media.pitchfork.com/photos/5fada5e07d93dabd75f424f4/master/pass/Megan-Thee-Stallion.png" alt="Hiss">
                    </td>
                    <td class="song-info">
                        <span class="badge badge-new">NEW</span>
                        <div class="song-title">Hiss</div>
                        <div class="artist-name">Megan Thee Stallion</div>
                    </td>
                    <td class="award">
                        <button class="btn-add">+</button>
                    </td>
                    <td class="last-week">
                        <span class="icon-star">★</span>
                    </td>
                    <td class="peak-pos">-</td>
                    <td class="weeks-chart">1</td>
                </tr>

                
                <tr class="song-row">
                    <td class="rank">
                        <span class="rank-number">2</span>
                    </td>
                    <td class="artwork">
                        <img src="https://yt3.googleusercontent.com/6KQV9B-m_cFu0b1aUnUFfbA3IQL5xY5yYgTWwuIEPJgY8p8HzgwtotTeksTzFQtdrJBrwd7i4A=s900-c-k-c0x00ffffff-no-rj" alt="Lovin On Me">
                    </td>
                    <td class="song-info">
                        <span class="icon-down">↓</span>
                        <div class="song-title">Lovin On Me</div>
                        <div class="artist-name">Jack Harlow</div>
                    </td>
                    <td class="award">
                        <button class="btn-add">+</button>
                    </td>
                    <td class="last-week">1</td>
                    <td class="peak-pos">1</td>
                    <td class="weeks-chart">12</td>
                </tr>

                
                <tr class="song-row">
                    <td class="rank">
                        <span class="rank-number">3</span>
                    </td>
                    <td class="artwork">
                        <img src="https://theithacan.org/wp-content/uploads/2023/10/taylor-swift.jpg" alt="Cruel Summer">
                    </td>
                    <td class="song-info">
                        <span class="icon-down">↓</span>
                        <div class="song-title">Cruel Summer</div>
                        <div class="artist-name">Taylor Swift</div>
                    </td>
                    <td class="award">
                        <button class="btn-add">+</button>
                    </td>
                    <td class="last-week">2</td>
                    <td class="peak-pos">1</td>
                    <td class="weeks-chart">39</td>
                </tr>

                <tr class="song-row">
                    <td class="rank">
                        <span class="rank-number">4</span>
                    </td>
                    <td class="artwork">
                        <img src="https://i.scdn.co/image/ab6761610000e5ebf9cf783eb03eb66aa43943ba" alt="Lose Control">
                    </td>
                    <td class="song-info">
                        <span class="icon-right">→</span>
                        <div class="song-title">Lose Control</div>
                        <div class="artist-name">Teddy Swims</div>
                    </td>
                    <td class="award">
                        <button class="btn-add">+</button>
                        <span class="icon-star-award">★</span>
                    </td>
                    <td class="last-week">4</td>
                    <td class="peak-pos">4</td>
                    <td class="weeks-chart">25</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact Form</title>
        <link rel="stylesheet" href="form1.css">
    </head>
    <body>
        <form class = "formulario"action="https://dummyjson.com/test" method="POST">
            <div class="container">
                <h1>Contact us!</h1>
                <p>Got something to say? Fire away!</p>
                

                
                
                <input type="text" id="first_name" name="firstName" class="first-input"  placeholder="First name*"/>
                <br />
                
                <input type="text" id="last_name" name="lastName" class = "second-input"  placeholder="Last name*"/>
                <br />
                <input type="text" id="email" name="email" class="third-input" placeholder="Email address*"/>
            <div class = "input-wrapper">               
                <span class="icon">✉</span>
            </div>            
                <select class="third-input" aria-label="What's your message about?">
                    <option value="" disabled selected hidden>
                        What's your message about? *
                    </option>
                    <option value="question">Question</option>
                    <option value="suggestion">Suggestion</option>
                </select>              
                
                <br />

                
                <textarea id="message" name="message" placeholder="Fire away!" class="fourth-input"></textarea>
                <br />

                <div class='button-container'>
                    <button class='clear-button my-button'>Send my Message!</button>
                </div>
            </div>
        </form>
    </body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Healthy</title>
  <link rel="stylesheet" href="extra_2.css">
</head>
<body>

  <div class="main-content">  <!-- contenedor principal flex horizontal -->

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo">  <!-- logo/nombre del sistema -->
        <h2>Welcome Jeff</h2>
      </div>
      <nav>
        <ul>
          <li><a href="#">Appointments</a></li>
          <li><a href="#">Finance</a></li>
          <li><a href="#">Book new appointment</a></li>
          <li><a href="#">Folder</a></li>
        </ul>
      </nav>
    </aside>

    <!-- ÁREA DERECHA -->
    <div class="section-1">

      <header class="dash-header">
        <h1>Welcome</h1>
        <div class="user-info">  <!-- info del usuario -->
          <span>Dr. Jeff</span>
        </div>
      </header>

      <main class="cards-container">
        <!-- Card 1: Citas hoy -->
        <div class="card appointments">
          <h3>Appointments today</h3>
          <p>15</p>
        </div>

        <!-- Card 2: Ingresos del mes -->
        <div class="card finance">
          <h3>Month Money</h3>
          <p>$55000</p>
        </div>

        <!-- Card 3: Total clientes -->
        <div class="card clients">
          <h3>Total clients</h3>
          <p>350 Clients</p>
        </div>
      </main>

      <footer class="dash-footer">
        <p>CRM Healthy</p>
      </footer>

    </div>
  </div>

</body>
</html>

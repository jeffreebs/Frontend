<!DOCTYPE html>
<html>
<head>
    <title>Cambio de Contraseña</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <h1>Cambio de Contraseña</h1>

        <input type="text" id="userId" placeholder="Tu ID de usuario">

        
        <input type="password" id="passwordAnterior" placeholder="Contraseña anterior">


        <input type="password" id="passwordNueva" placeholder="Nueva contraseña">

        <input type="password" id="passwordConfirm" placeholder="Confirmar nueva contraseña">


        <button id="btn-cambiar">Cambiar contraseña</button>

        
        <p id="mensaje"></p>

    </div>

    <script src="request_dom04.js"></script>
</body>
</html>

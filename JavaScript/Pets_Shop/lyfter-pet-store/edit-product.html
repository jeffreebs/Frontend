<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar producto — Lyfter Pet Store</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages/admin.css" />
</head>
<body>

  
  <nav class="navbar">
    <a href="index.html" class="navbar__logo">🐾 Lyfter Pet Store</a>
    <ul class="navbar__links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="catalog.html">Productos</a></li>
      <li><a href="admin.html" class="active">Administración</a></li>
      <li id="nav-user"><span id="nav-username"></span></li>
      <li><a href="#" id="btn-logout">Cerrar sesión</a></li>
    </ul>
  </nav>

  <main>
    <section class="edit-product">

      <div class="edit-product__card">

        <h1 class="edit-product__title">Editar producto</h1>

        <p class="error-msg" id="edit-error"></p>
        <p class="success-msg" id="edit-success"></p>

        <div class="form-group">
          <label for="edit-name">Nombre</label>
          <input type="text" id="edit-name" placeholder="Nombre del producto" />
        </div>

        <div class="form-group">
          <label for="edit-description">Descripción</label>
          <textarea
            id="edit-description"
            rows="4"
            placeholder="Descripción del producto"
          ></textarea>
        </div>

        <div class="form-group">
          <label for="edit-price">Precio</label>
          <input type="number" id="edit-price" placeholder="19.99" step="0.01" />
        </div>

        <div class="form-group">
          <label for="edit-category">Categoría</label>
          <input type="text" id="edit-category" placeholder="Ej: Juguetes" />
        </div>

        <div class="form-group">
          <label for="edit-image">URL de la imagen</label>
          <input type="text" id="edit-image" placeholder="https://example.com/imagen.jpg" />
        </div>

        <div class="form-group">
          <label for="edit-stock">Stock</label>
          <input type="number" id="edit-stock" placeholder="50" />
        </div>

        <div class="edit-product__actions">
          <a href="admin.html" class="btn btn--outline">Cancelar</a>
          <button
            class="btn btn--primary"
            id="btn-save"
            data-label="Guardar cambios"
          >
            Guardar cambios
          </button>
        </div>

      </div>

    </section>
  </main>

  
  <footer class="footer">
    <p>© 2025 Lyfter Pet Store — Todos los derechos reservados.</p>
  </footer>

  
  <script src="js/utils/session.js"></script>
  <script src="js/utils/validators.js"></script>
  <script src="js/utils/ui.js"></script>
  <script src="js/utils/mock-data.js"></script>
  <script src="js/api/config.js"></script>
  <script src="js/api/products.api.js"></script>
  <script src="js/pages/admin.js"></script>

</body>
</html>

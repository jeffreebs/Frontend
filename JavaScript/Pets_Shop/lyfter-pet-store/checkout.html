<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resumen del pedido — Lyfter Pet Store</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages/auth.css" />
</head>
<body>

  
  <nav class="navbar">
    <a href="index.html" class="navbar__logo">🐾 Lyfter Pet Store</a>
    <ul class="navbar__links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="catalog.html">Productos</a></li>
      <li id="nav-user" style="display:none"><span id="nav-username"></span></li>
      <li id="nav-logout" style="display:none"><a href="#" id="btn-logout">Cerrar sesión</a></li>
    </ul>
  </nav>

  <main>
    <section style="max-width:55rem; margin:3rem auto; padding:0 2rem;">

      <h1 style="font-size:1.8rem; font-weight:700; margin-bottom:2rem;">
        Resumen del pedido
      </h1>

      <div style="display:flex; gap:2rem; flex-wrap:wrap; align-items:flex-start;">


        <div class="card" style="flex:1; min-width:18rem; padding:2rem;">
          <h2 style="font-size:1.1rem; font-weight:600; margin-bottom:1.5rem;">
            Información de compra
          </h2>

          <p class="error-msg" id="checkout-error"></p>

          <div class="form-group">
            <label for="billing-name">Nombre completo</label>
            <input type="text" id="billing-name" placeholder="Juan Pérez" />
          </div>

          <div class="form-group">
            <label for="billing-address">Dirección</label>
            <input type="text" id="billing-address" placeholder="Calle, número, ciudad" />
          </div>

          <div class="form-group">
            <label for="billing-tax-id">Cédula / RUC</label>
            <input type="text" id="billing-tax-id" placeholder="1-2345-6789" />
          </div>

          <p style="font-size:0.85rem; color:var(--text-muted); margin-top:0.5rem;">
            Esta información se utilizará para completar la compra.
          </p>
        </div>

        <div class="card" style="flex:1; min-width:16rem; padding:2rem;">
          <h2 style="font-size:1.1rem; font-weight:600; margin-bottom:1.5rem;">
            Detalle del pedido
          </h2>

          <div id="checkout-items">
          </div>

          <div style="border-top:0.0625rem solid var(--border); padding-top:1rem; margin-top:1rem;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <span style="font-weight:600;">Total:</span>
              <span
                style="font-size:1.4rem; font-weight:700; color:var(--primary);"
                id="checkout-total"
              >
                ₡0
              </span>
            </div>
          </div>

          <div style="display:flex; flex-direction:column; gap:0.75rem; margin-top:1.5rem;">
            <button
              class="btn btn--primary"
              id="btn-confirm"
              data-label="Confirmar compra"
            >
              Confirmar compra
            </button>
            <a href="cart.html" class="btn btn--outline">Cancelar</a>
          </div>

        </div>
      </div>

    </section>
  </main>

  
  <footer class="footer">
    <p>© 2025 Lyfter Pet Store — Todos los derechos reservados.</p>
  </footer>


  <script src="js/utils/mock-data.js"></script>
  <script src="js/utils/session.js"></script>
  <script src="js/utils/validators.js"></script>
  <script src="js/utils/ui.js"></script>
  <script src="js/api/config.js"></script>
  <script src="js/api/cart.api.js"></script>
  <script src="js/pages/checkout.js"></script>

</body>
</html>

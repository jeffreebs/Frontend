<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta — Lyfter Pet Store</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages/auth.css" />
</head>
<body>

  
  <nav class="navbar">
    <a href="index.html" class="navbar__logo">🐾 Lyfter Pet Store</a>
    <ul class="navbar__links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="catalog.html">Productos</a></li>
      <li><a href="login.html" class="btn btn--primary">Iniciar sesión</a></li>
    </ul>
  </nav>

  <main>
    <section class="auth">
      <div class="auth__card">

        <h1 class="auth__title">Crear cuenta</h1>
        <p class="auth__subtitle">Completá el formulario para registrarte.</p>

        <p class="error-msg" id="register-error"></p>
        <p class="success-msg" id="register-success"></p>

        <div class="auth__form">
          <div class="form-group">
            <label for="name">Nombre completo</label>
            <input
              type="text"
              id="name"
              placeholder="Introduce tu nombre completo"
            />
          </div>

          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input
              type="email"
              id="email"
              placeholder="ejemplo@dominio.com"
            />
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              placeholder="Mínimo 8 caracteres"
            />
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirmar contraseña</label>
            <input
              type="password"
              id="confirm-password"
              placeholder="Repetí tu contraseña"
            />
          </div>

          <button
            class="btn btn--primary"
            id="btn-register"
            data-label="Registrarse"
          >
            Registrarse
          </button>
        </div>

        <div class="auth__footer">
          <p>¿Ya tenés cuenta? <a href="login.html">Iniciá sesión aquí</a></p>
        </div>

      </div>
    </section>
  </main>

  
  <footer class="footer">
    <p>© 2025 Lyfter Pet Store — Todos los derechos reservados.</p>
  </footer>

  
  <script src="js/utils/session.js"></script>
  <script src="js/utils/validators.js"></script>
  <script src="js/utils/ui.js"></script>
  <script src="js/utils/mock-data.js"></script>
  <script src="js/api/config.js"></script>
  <script src="js/api/auth.api.js"></script>
  <script src="js/pages/register.js"></script>

</body>
</html>

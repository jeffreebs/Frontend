<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Lyfter Pet Store</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages/auth.css" />
</head>
<body>

  
  <nav class="navbar">
    <a href="index.html" class="navbar__logo">🐾 Lyfter Pet Store</a>
    <ul class="navbar__links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="catalog.html">Productos</a></li>
    </ul>
  </nav>

  <main>
    <section class="auth">
      <div class="auth__card">

        <h1 class="auth__title">Iniciar sesión</h1>
        <p class="auth__subtitle">Ingresá tu correo y contraseña para continuar.</p>

        <p class="error-msg" id="login-error"></p>

        <div class="auth__form">
          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input
              type="email"
              id="email"
              placeholder="nombre@ejemplo.com"
            />
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              placeholder="Introduce tu contraseña"
            />
          </div>

          <button
            class="btn btn--primary"
            id="btn-login"
            data-label="Ingresar"
          >
            Ingresar
          </button>
        </div>

        <div class="auth__footer">
          <p>¿No tenés cuenta? <a href="register.html">Registrate aquí</a></p>
          <p style="margin-top: 0.5rem"><a href="index.html">Volver al inicio</a></p>
        </div>

      </div>
    </section>
  </main>


  <footer class="footer">
    <p>© 2025 Lyfter Pet Store — Todos los derechos reservados.</p>
  </footer>

  <script src="js/utils/mock-data.js"></script>
  <script src="js/utils/session.js"></script>
  <script src="js/utils/validators.js"></script>
  <script src="js/utils/ui.js"></script>
  <script src="js/api/config.js"></script>
  <script src="js/api/auth.api.js"></script>
  <script src="js/pages/login.js"></script>

</body>
</html>

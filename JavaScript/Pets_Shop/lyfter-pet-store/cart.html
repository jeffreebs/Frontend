<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrito — Lyfter Pet Store</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages/catalog.css" />
</head>
<body>

  
  <nav class="navbar">
    <a href="index.html" class="navbar__logo">🐾 Lyfter Pet Store</a>
    <ul class="navbar__links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="catalog.html">Productos</a></li>
      <li id="nav-admin" style="display:none"><a href="admin.html">Administración</a></li>
      <li id="nav-cart" style="display:none">
        <a href="cart.html" class="cart-icon active">
          🛒
          <span class="cart-badge" id="cart-badge">0</span>
        </a>
      </li>
      <li id="nav-user" style="display:none"><span id="nav-username"></span></li>
      <li id="nav-logout" style="display:none"><a href="#" id="btn-logout">Cerrar sesión</a></li>
      <li id="nav-login"><a href="login.html" class="btn btn--primary">Iniciar sesión</a></li>
    </ul>
  </nav>

  <main>
    <section class="catalog">

      <div class="catalog__header">
        <h1 class="catalog__title">Carrito de compras</h1>
      </div>

      <div class="empty-state" id="empty-cart" style="display:none">
        <div class="empty-state__icon">📦</div>
        <h2 class="empty-state__title">Tu carrito está vacío</h2>
        <p class="empty-state__subtitle">Agregá productos desde el catálogo.</p>
        <a href="catalog.html" class="btn btn--primary" style="width:auto; margin-top:1rem">
          Ver productos
        </a>
      </div>

      <div id="cart-content" style="display:none">
        <div style="display:flex; gap:2rem; align-items:flex-start; flex-wrap:wrap;">

          <div style="flex:2; min-width:18rem;">
            <div id="cart-items">
            </div>
          </div>

          
          <div class="card" style="flex:1; min-width:14rem; padding:1.5rem;">
            <h2 style="font-size:1.1rem; font-weight:600; margin-bottom:1rem;">
              Resumen
            </h2>
            <div style="display:flex; justify-content:space-between; margin-bottom:1.5rem;">
              <span style="color:var(--text-muted)">Total:</span>
              <span style="font-size:1.3rem; font-weight:700; color:var(--primary)" id="cart-total">
                ₡0
              </span>
            </div>
            <p class="error-msg" id="cart-error"></p>
            <button
              class="btn btn--primary"
              id="btn-checkout"
              data-label="Continuar al checkout"
            >
              Continuar al checkout
            </button>
          </div>

        </div>
      </div>

    </section>
  </main>

  
  <footer class="footer">
    <p>© 2025 Lyfter Pet Store — Todos los derechos reservados.</p>
  </footer>

  
  <script src="js/utils/session.js"></script>
  <script src="js/utils/ui.js"></script>
  <script src="js/utils/mock-data.js"></script>
  <script src="js/api/config.js"></script>
  <script src="js/api/cart.api.js"></script>
  <script src="js/pages/cart.js"></script>

</body>
</html>

<!doctype html>
<html>
  <form action="https://dummyjson.com/test" method="POST">
    <h1>Book your stay</h1>
    <p>Complete the information</p>

    <label for="full_name">Full name </label>
    <br />
    <input type="text" id="full_name" name="full_name" />
    <br />
    <label for="email">Email</label>
    <br />
    <input type="text" id="email" name="email" />
    <br />
    <br />

    <br />

    <br/>

    <br />

    <br/>
    <br/>

    <input type="radio" id="Suite" name="type" value="Suite">
    <label for="Suite">Suite</label>

    <p>Add aditional service</p>

    <input type="checkbox" id="Breakfast" name="opcion1" value="Breakfast">
    <label for="Breakfast">Breakfast</label>
    <br>
    <input type="checkbox" id="Parking" name="opcion2" value="Parking">
    <label for="Parking">Parking</label>
    <br>
    <input type="checkbox" id="Wifi" name="opcion3" value="Wifi">

  </form>

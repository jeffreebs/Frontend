<!DOCTYPE html>
<html>
    <form action="https://dummyjson.com/test" method="POST">
    <h1>Survey about your reading habits</h1>
    <p>Complete the next information</p>

    <label for="full_name">Full name </label>
    <br />
    <input type="text" id="full_name" name="full_name" />
    <br />
    <label for="Age">Age</label>
    <br />
    <input type="text" id="Age" name="Age" />
    <br />
    <p>How often do you read a book</p>
    <input type="radio" id="Daily" name="type" value="Daily">
    <label for="Daily">Daily</label><br>

    <input type="radio" id="Weekly" name="type" value="Weekly">
    <label for="Weekly">Weekly</label>
    <br>
    <input type="radio" id="Monthly" name="type" value="Monthly">
    <label for="Monthly">Monthy</label>
    <br>
    <label for="message">Recomend your favorite book</label>
    <br/>
    <textarea id="message" name="message"></textarea>
    <br />
    </form>
    <form action="resume.html" method="get">
        <button type="submit">Send</button>
    </form>
</html>
